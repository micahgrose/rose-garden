<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ollie</title>
        <link rel="icon" type="image/png" href="OllieIcon.png">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { overflow: hidden; background: #0a1a0a; font-family: 'Segoe UI', sans-serif; }

            /* ── Shared overlays ── */
            .overlay {
                position: fixed; inset: 0;
                display: flex; align-items: center; justify-content: center;
                background: rgba(8,8,8,0.92);
                z-index: 10;
            }
            .overlay.hidden { display: none; }

            /* ── Main menu ── */
            #menuBox {
                text-align: center; color: #dff0ff;
                display: flex; flex-direction: column; align-items: center;
                gap: 16px; min-width: 280px;
            }
            #menuBox h1 { font-size: 4.5rem; font-weight: 800; letter-spacing: 6px; color: #c8e8ff; }
            #menuBox .subtitle { font-size: 0.8rem; color: #3a6a8a; letter-spacing: 3px; text-transform: uppercase; margin-top: -10px; }

            .menu-btn {
                width: 100%; padding: 12px; border: none; border-radius: 4px;
                font-size: 0.95rem; font-weight: 600; letter-spacing: 1px;
                cursor: pointer; transition: opacity 0.15s, transform 0.1s;
            }
            .menu-btn:hover  { opacity: 0.85; transform: translateY(-1px); }
            .menu-btn:active { transform: translateY(0); }
            #playBtn     { background: #1a6ea8; color: #d0eeff; border: 1px solid #2a8fd4; margin-top: 8px; }
            #editorBtn   { background: #2a1a0a; color: #e09030; border: 1px solid #a06010; }
            #controlsBtn { background: transparent; color: #4a80a8; border: 1px solid #1a3a55; }
            #quitBtn     { background: transparent; color: #2a4a60; border: 1px solid #1a2a35; font-size: 0.8rem; }

            /* ── Level select ── */
            #levelSelectBox {
                color: #dff0ff; display: flex; flex-direction: column;
                align-items: center; gap: 16px; width: 90vw; max-width: 560px;
            }
            #levelSelectBox h2 { font-size: 1.4rem; font-weight: 800; letter-spacing: 4px; color: #c8e8ff; }
            #levelGrid {
                display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 8px; width: 100%; max-height: 50vh; overflow-y: auto; padding: 2px;
            }
            .level-btn {
                height: 56px; padding: 0 4px; border-radius: 3px; border: 1px solid #1a3a55;
                background: #0d2233; color: #a0c8e8; font-size: 0.8rem; font-weight: 700;
                cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: center;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                overflow: hidden;
            }
            .level-btn .level-name {
                font-size: 0.65rem; font-weight: 400; color: #6a9ab8;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                max-width: 100%; padding: 0 2px;
            }
            .level-btn:hover:not(.locked) { border-color: #2a8fd4; transform: translateY(-1px); }
            .level-btn.completed { border-color: #4caf50; color: #4caf50; }
            .level-btn.locked    { opacity: 0.3; cursor: default; }
            .level-btn .level-num   { font-size: 1.1rem; display: block; margin-bottom: 2px; }
            .level-btn .level-check { font-size: 0.7rem; color: #4caf50; }
            #backFromSelect {
                background: transparent; border: 1px solid #1a3a55; color: #3a6a8a;
                padding: 6px 20px; border-radius: 3px; cursor: pointer; font-size: 0.85rem;
            }
            #backFromSelect:hover { color: #7ab8d8; }

            /* ── Game HUD ── */
            #gameHUD {
                position: fixed; top: 12px; left: 12px;
                display: flex; gap: 6px; z-index: 10;
            }
            #gameHUD button {
                width: 44px; height: 44px;
                border-radius: 0;
                border: 1px solid #2a8fd4;
                background: #1a6ea8; color: #d0eeff;
                font-size: 1.1rem; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                transition: background 0.1s;
            }
            #gameHUD button:hover { background: #2280c0; }
            #levelNameDisplay {
                position: fixed; top: 12px; right: 12px;
                height: 44px; padding: 0 14px;
                background: #1a6ea8; border: 1px solid #2a8fd4;
                color: #d0eeff; font-size: 0.85rem; font-weight: 700;
                letter-spacing: 1px; text-transform: uppercase;
                display: flex; align-items: center;
                z-index: 10;
            }
            #levelNameDisplay.hidden { display: none; }

            /* ── Controls popup ── */
            #controlsBox {
                background: #141414; border: 1px solid #2a2a2a; border-radius: 12px;
                padding: 28px 36px; color: #ccc; min-width: 260px; text-align: left;
            }
            #controlsBox h2 { font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; color: #f0f0f0; margin-bottom: 18px; }
            .control-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; padding: 6px 0; border-bottom: 1px solid #1e1e1e; font-size: 0.85rem; color: #888; }
            .control-row:last-of-type { border-bottom: none; }
            .keys { display: flex; gap: 4px; }
            .key  { background: #222; border: 1px solid #444; border-radius: 4px; padding: 2px 7px; font-size: 0.75rem; color: #ddd; font-family: monospace; }
            #closeControlsBtn { margin-top: 20px; width: 100%; padding: 9px; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #888; cursor: pointer; font-size: 0.85rem; }
            #closeControlsBtn:hover { opacity: 0.8; }

            /* ── Editor HUD (transparent container, top bar is the only solid part) ── */
            #editorHUD {
                position: fixed; inset: 0;
                pointer-events: none;
                z-index: 15;
            }
            #editorHUD.hidden { display: none; }

            #edTopBar {
                pointer-events: auto;
                display: flex; align-items: center; gap: 8px;
                padding: 6px 12px;
                background: rgba(10,10,10,0.93);
                border-bottom: 1px solid #222;
                flex-wrap: wrap;
                backdrop-filter: blur(4px);
            }
            #edTopBar input[type="text"], #edTopBar input[type="number"] {
                background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0f0f0;
                padding: 4px 8px; border-radius: 5px; font-size: 0.8rem;
            }
            #edTopBar input[type="text"]   { width: 130px; }
            #edTopBar input[type="number"] { width: 55px;  }
            #edLevelSelect { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc; padding: 4px 6px; border-radius: 5px; font-size: 0.78rem; }

            .tool-btn {
                padding: 5px 9px; border-radius: 5px; border: 1px solid #2a2a2a;
                background: #1a1a1a; color: #888; cursor: pointer; font-size: 0.82rem;
                font-weight: 600; transition: background 0.1s; white-space: nowrap;
            }
            .tool-btn:hover { background: #252525; color: #ccc; }
            .tool-btn.active { background: #1a3a1a; border-color: #4caf50; color: #4caf50; }

            .ed-btn { padding: 4px 12px; border-radius: 5px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #aaa; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
            .ed-btn:hover { background: #252525; }
            .ed-btn.save-btn  { background: #152515; border-color: #3a8a3a; color: #4caf50; }
            .ed-btn.play-btn  { background: #152525; border-color: #3a8aaa; color: #5bcfef; }
            .ed-btn.danger    { background: #251515; border-color: #8a3a3a; color: #c05050; }
            .ed-btn.quit-btn  { border-color: #333; color: #666; }

            .ed-sep { width: 1px; height: 22px; background: #252525; flex-shrink: 0; }

            /* ── Play test HUD ── */
            #playTestHUD {
                position: fixed; top: 0; left: 0; right: 0;
                pointer-events: none;
                z-index: 15;
                display: flex; align-items: center; gap: 10px;
                padding: 8px 14px;
                background: rgba(10,10,10,0.7);
                border-bottom: 1px solid #1a1a1a;
                backdrop-filter: blur(4px);
            }
            #playTestHUD.hidden { display: none; }
            #playTestHUD button { pointer-events: auto; }
            #playTestLabel { color: #5bcfef; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

            .hidden { display: none; }
        </style>
    </head>
    <body>
        <!-- Main menu -->
        <div id="menu" class="overlay">
            <div id="menuBox">
                <h1>OLLIE</h1>
                <p class="subtitle">A 2D Platformer</p>
                <button class="menu-btn" id="playBtn">LEVELS</button>
                <button class="menu-btn hidden" id="editorBtn">LEVEL EDITOR</button>
                <button class="menu-btn" id="controlsBtn">Controls</button>
                <button class="menu-btn" id="quitBtn">Quit to RoseGarden</button>
            </div>
        </div>

        <!-- Level select -->
        <div id="levelSelect" class="overlay hidden">
            <div id="levelSelectBox">
                <h2>SELECT LEVEL</h2>
                <div id="levelGrid"><span style="color:#555;font-size:0.9rem;">No levels yet.</span></div>
                <button id="backFromSelect">← Back</button>
            </div>
        </div>

        <!-- Controls popup -->
        <div id="controlsOverlay" class="overlay hidden">
            <div id="controlsBox">
                <h2>Controls</h2>
                <div class="control-row"><span>Move</span><div class="keys"><span class="key">A</span><span class="key">D</span><span class="key">←</span><span class="key">→</span></div></div>
                <div class="control-row"><span>Jump</span><div class="keys"><span class="key">W</span><span class="key">↑</span></div></div>
                <div class="control-row"><span>Boost</span><div class="keys"><span class="key">Space</span></div></div>
                <div class="control-row"><span>Menu</span><div class="keys"><span class="key">Esc</span></div></div>
                <button id="closeControlsBtn">Close</button>
            </div>
        </div>

        <!-- Editor HUD (transparent, sits over game canvas) -->
        <div id="editorHUD" class="hidden">
            <div id="edTopBar">
                <span style="color:#e09030;font-weight:700;font-size:0.82rem;letter-spacing:2px;">EDITOR</span>
                <div class="ed-sep"></div>

                <!-- Tools -->
                <button class="tool-btn active" data-tool="select"   title="Select / Move [S]">✥ Select</button>
                <button class="tool-btn"         data-tool="platform" title="Draw Platform [P]">▬ Platform</button>
                <button class="tool-btn"         data-tool="jumppad"  title="Place JumpPad [J]">⬆ JumpPad</button>
                <button class="tool-btn"         data-tool="spawn"    title="Set Spawn [R]">◎ Spawn</button>
                <button class="tool-btn"         data-tool="delete"   title="Delete [X]">✕ Delete</button>
                <button class="tool-btn"         data-tool="finish"   title="Place Finish [F]">⚑ Finish</button>
                <div class="ed-sep"></div>
                <button class="tool-btn"         data-tool="spike"    title="Draw Spikes [K]">▲ Spike</button>
                <button class="tool-btn"         data-tool="saw"      title="Place Sawblade [W]">⚙ Saw</button>
                <button class="tool-btn"         data-tool="orbitsaw" title="Orbit Saw [B]">⊙ Orbit</button>
                <button class="tool-btn"         data-tool="mplatform" title="Moving Platform [M]">↔ Mover</button>
                <button class="tool-btn"         data-tool="onoff"    title="On/Off Block [T]">□ Toggle</button>
                <button class="tool-btn"         data-tool="switch"   title="Place Switch [H]">⚡ Switch</button>
                <div class="ed-sep"></div>

                <!-- Level info -->
                <input type="text"   id="edLevelName"  placeholder="Level name">
                <label style="color:#444;font-size:0.75rem;">Ord:</label>
                <input type="number" id="edLevelOrder" value="1" min="1">
                <select id="edLevelSelect"><option value="">— New Level —</option></select>
                <div class="ed-sep"></div>

                <!-- Actions -->
                <button class="ed-btn save-btn" id="edSaveBtn">Save</button>
                <button class="ed-btn danger"   id="edDeleteBtn" style="display:none;">Delete</button>
                <button class="ed-btn"          id="edClearBtn">Clear</button>
                <div class="ed-sep"></div>

                <button class="ed-btn play-btn" id="edPlayTestBtn">▶ Play Test</button>
                <button class="ed-btn quit-btn" id="edQuitBtn">← Menu</button>

                <span id="edStatus" style="color:#555;font-size:0.75rem;margin-left:4px;"></span>
                <span id="edCoordsInfo" style="margin-left:auto;color:#333;font-size:0.72rem;font-family:monospace;"></span>
            </div>
        </div>

        <!-- Play test HUD -->
        <div id="playTestHUD" class="hidden">
            <span id="playTestLabel">▶ Play Test</span>
            <button class="ed-btn" id="backToEditorBtn" style="pointer-events:auto;">← Back to Editor</button>
            <span style="color:#333;font-size:0.72rem;margin-left:4px;">Esc also works</span>
        </div>

        <!-- Game HUD -->
        <div id="gameHUD" class="hidden">
            <button id="pauseBtn" title="Pause">⏸</button>
            <button id="restartBtn" title="Restart">↺</button>
        </div>
        <div id="levelNameDisplay" class="hidden"></div>

        <canvas id="gameCanvas"></canvas>
        <script src="platformer.js"></script>
    </body>
</html>
