<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ollie</title>
        <link rel="icon" type="image/png" href="OllieIcon.png">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { overflow: hidden; background: rgb(214, 253, 214); font-family: 'Segoe UI', sans-serif; }

            /* ── Menu overlay ── */
            #menu {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(8, 8, 8, 0.92);
                z-index: 10;
            }
            #menu.hidden { display: none; }

            #menuBox {
                text-align: center;
                color: #f0f0f0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
                min-width: 280px;
            }

            #menuBox h1 {
                font-size: 4.5rem;
                font-weight: 800;
                letter-spacing: 6px;
                color: #f0f0f0;
            }

            #menuBox .subtitle {
                font-size: 0.8rem;
                color: #555;
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-top: -10px;
            }

            .menu-btn {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 600;
                letter-spacing: 1px;
                cursor: pointer;
                transition: opacity 0.15s, transform 0.1s;
            }
            .menu-btn:hover { opacity: 0.85; transform: translateY(-1px); }
            .menu-btn:active { transform: translateY(0); }

            #playBtn     { background: #e0e0e0; color: #111; margin-top: 8px; }
            #controlsBtn { background: transparent; color: #888; border: 1px solid #333; }
            #quitBtn     { background: transparent; color: #555; border: 1px solid #222; font-size: 0.8rem; }

            /* ── Controls popup ── */
            #controlsOverlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0,0,0,0.6);
                z-index: 20;
            }
            #controlsOverlay.hidden { display: none; }

            #controlsBox {
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 12px;
                padding: 28px 36px;
                color: #ccc;
                min-width: 260px;
                text-align: left;
            }
            #controlsBox h2 {
                font-size: 1rem;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #f0f0f0;
                margin-bottom: 18px;
            }
            .control-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 20px;
                padding: 6px 0;
                border-bottom: 1px solid #1e1e1e;
                font-size: 0.85rem;
                color: #888;
            }
            .control-row:last-of-type { border-bottom: none; }
            .keys { display: flex; gap: 4px; }
            .key {
                background: #222;
                border: 1px solid #444;
                border-radius: 4px;
                padding: 2px 7px;
                font-size: 0.75rem;
                color: #ddd;
                font-family: monospace;
            }
            #closeControlsBtn {
                margin-top: 20px;
                width: 100%;
                padding: 9px;
                background: #1e1e1e;
                border: 1px solid #333;
                border-radius: 6px;
                color: #888;
                cursor: pointer;
                font-size: 0.85rem;
                transition: opacity 0.15s;
            }
            #closeControlsBtn:hover { opacity: 0.8; }
        </style>
    </head>
    <body>
        <!-- Main menu -->
        <div id="menu">
            <div id="menuBox">
                <h1>OLLIE</h1>
                <p class="subtitle">A 2D Platformer</p>
                <button class="menu-btn" id="playBtn">PLAY</button>
                <button class="menu-btn" id="controlsBtn">Controls</button>
                <button class="menu-btn" id="quitBtn">Quit to RoseGarden</button>
            </div>
        </div>

        <!-- Controls popup -->
        <div id="controlsOverlay" class="hidden">
            <div id="controlsBox">
                <h2>Controls</h2>
                <div class="control-row"><span>Move</span><div class="keys"><span class="key">A</span><span class="key">D</span><span class="key">←</span><span class="key">→</span></div></div>
                <div class="control-row"><span>Jump</span><div class="keys"><span class="key">W</span><span class="key">↑</span></div></div>
                <div class="control-row"><span>Boost</span><div class="keys"><span class="key">Space</span></div></div>
                <div class="control-row"><span>Menu</span><div class="keys"><span class="key">Esc</span></div></div>
                <button id="closeControlsBtn">Close</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <script src="platformer.js"></script>
    </body>
</html>
