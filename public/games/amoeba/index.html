<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amoeba – RoseGarden</title>
    <link rel="icon" type="image/png" href="AmoebaIcon.png">
    <link rel="stylesheet" href="amoeba.css">
</head>
<body>
    <canvas id="c"></canvas>

    <div id="hud">
        <div id="sizeText">Size: 10</div>
        <div id="playerText">Players: 0</div>
    </div>

    <div id="killScreen">
        <div class="kill-title">You Were Eaten</div>
        <div class="kill-by">by <span id="killerName">—</span></div>
        <div class="kill-respawn">Respawning...</div>
    </div>

    <div id="pausePanel">
        <div id="pauseTitle">PAUSED</div>
        <a href="/" id="leaveBtn">← Leave to Rose Garden</a>
        <button id="resumeBtn">Resume</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="Amoeba.js"></script>
</body>
</html>
